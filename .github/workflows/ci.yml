name: Python CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black pylint pytest pytest-cov

    - name: Lint with pylint
      run: |
        pylint src/ app/ --fail-under=7.0 || true
      continue-on-error: true

    - name: Format check with black
      run: |
        black --check src/ app/ || true
      continue-on-error: true

    - name: Check for syntax errors
      run: |
        python -m py_compile src/*.py app/*.py

    - name: Verify imports
      run: |
        python -c "from src.features import build_features"
        python -c "from src.inference import Forecaster"
        python -c "import streamlit"

    - name: Test data pipeline
      run: |
        python -c "
        import pandas as pd
        df = pd.read_csv('data/processed/train_ready.csv', nrows=10)
        print(f'✓ Data pipeline OK: {df.shape[0]} rows loaded')
        "

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8

    - name: Check imports with isort
      run: isort --check-only src/ app/ || true
      continue-on-error: true

    - name: Lint with flake8
      run: flake8 src/ app/ --max-line-length=100 --ignore=E501,W503 || true
      continue-on-error: true

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Check dependencies with safety
      run: safety check --json || true
      continue-on-error: true

    - name: Scan code with bandit
      run: bandit -r src/ app/ -f json -o /tmp/bandit.json || true
      continue-on-error: true
